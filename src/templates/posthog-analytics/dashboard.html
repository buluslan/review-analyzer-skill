<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --ph-sage: #4d4f46;
            --ph-orange: #F54E00;
            --ph-orange-light: #ff7a33;
            --ph-bg: #FAFAF8;
            --ph-card: #FFFFFF;
            --ph-border: #E8E6E1;
            --ph-text: #2C2E2A;
            --ph-text-secondary: #6B6D64;
            --ph-text-muted: #9A9C94;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { font-size: 16px; scroll-behavior: smooth; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--ph-bg);
            color: var(--ph-text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1360px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Header */
        .header {
            padding: 2rem 0;
            border-bottom: 1px solid var(--ph-border);
            margin-bottom: 2rem;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--ph-orange);
            background: rgba(245, 78, 0, 0.08);
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .header-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--ph-orange);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--ph-text);
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .header-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            font-size: 0.875rem;
            color: var(--ph-text-secondary);
        }

        .header-meta span {
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .kpi-card {
            background: var(--ph-card);
            border: 1px solid var(--ph-border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
        }

        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(77, 79, 70, 0.08);
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 12px 12px 0 0;
        }

        .kpi-card.accent-orange::before { background: var(--ph-orange); }
        .kpi-card.accent-sage::before { background: var(--ph-sage); }
        .kpi-card.accent-green::before { background: #4CAF50; }
        .kpi-card.accent-blue::before { background: #5B8DEF; }

        .kpi-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ph-text-muted);
            margin-bottom: 0.5rem;
        }

        .kpi-value {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--ph-text);
            line-height: 1;
        }

        .kpi-desc {
            font-size: 0.813rem;
            color: var(--ph-text-secondary);
            margin-top: 0.5rem;
        }

        /* Section */
        .section {
            margin-bottom: 2.5rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .section-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--ph-text);
        }

        /* Chart Panel */
        .chart-panel {
            background: var(--ph-card);
            border: 1px solid var(--ph-border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .chart-panel-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--ph-text);
            margin-bottom: 1rem;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 1rem;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-height: 320px;
        }

        /* Strategy */
        .strategy-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .strategy-card {
            background: var(--ph-card);
            border: 1px solid var(--ph-border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .strategy-card-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .strategy-item {
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--ph-border);
        }

        .strategy-item:last-child { border-bottom: none; }

        .strategy-item-title {
            font-size: 0.938rem;
            font-weight: 600;
            color: var(--ph-text);
            margin-bottom: 0.25rem;
        }

        .strategy-item-desc {
            font-size: 0.813rem;
            color: var(--ph-text-secondary);
        }

        /* VOC */
        .voc-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
        }

        .voc-card {
            background: var(--ph-card);
            border: 1px solid var(--ph-border);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
        }

        .voc-card.danger {
            border-left: 3px solid #e53935;
        }

        .voc-card:not(.danger) {
            border-left: 3px solid #4CAF50;
        }

        .voc-profile {
            font-size: 0.813rem;
            font-weight: 600;
            color: var(--ph-text);
            margin-bottom: 0.25rem;
        }

        .voc-status {
            font-size: 0.75rem;
            font-weight: 500;
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 0.75rem;
        }

        .voc-status.positive {
            background: rgba(76, 175, 80, 0.1);
            color: #2e7d32;
        }

        .voc-status.negative {
            background: rgba(229, 57, 53, 0.1);
            color: #c62828;
        }

        .voc-status.neutral-status {
            background: rgba(91, 141, 239, 0.1);
            color: #1565c0;
        }

        .voc-quote {
            font-size: 0.875rem;
            color: var(--ph-text-secondary);
            line-height: 1.7;
            font-style: italic;
        }

        .voc-quote::before { content: '\201C'; font-size: 1.25rem; color: var(--ph-orange); }
        .voc-quote::after { content: '\201D'; font-size: 1.25rem; color: var(--ph-orange); }

        /* Chapters */
        .chapter-card {
            background: var(--ph-card);
            border: 1px solid var(--ph-border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .chapter-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--ph-text);
            margin-bottom: 0.75rem;
        }

        .chapter-content {
            font-size: 0.938rem;
            color: var(--ph-text-secondary);
            line-height: 1.8;
        }

        .chapter-content h2 { font-size: 1.063rem; font-weight: 600; color: var(--ph-text); margin: 1rem 0 0.5rem; }
        .chapter-content h3 { font-size: 1rem; font-weight: 600; color: var(--ph-text); margin: 0.75rem 0 0.375rem; }
        .chapter-content p { margin-bottom: 0.75rem; }
        .chapter-content ul, .chapter-content ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .chapter-content li { margin-bottom: 0.25rem; }
        .chapter-content blockquote { border-left: 3px solid var(--ph-orange); padding-left: 1rem; margin: 0.75rem 0; color: var(--ph-text); font-style: italic; }
        .chapter-content strong { color: var(--ph-text); font-weight: 600; }

        /* Execution Matrix */
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .matrix-table th {
            text-align: left;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ph-text-muted);
            padding: 0.75rem 1rem;
            border-bottom: 2px solid var(--ph-border);
        }

        .matrix-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--ph-border);
            color: var(--ph-text-secondary);
        }

        .urgency-badge {
            font-size: 0.688rem;
            font-weight: 600;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .urgency-badge.immediate { background: rgba(229, 57, 53, 0.1); color: #c62828; }
        .urgency-badge.short-term { background: rgba(245, 78, 0, 0.1); color: var(--ph-orange); }
        .urgency-badge.long-term { background: rgba(76, 175, 80, 0.1); color: #2e7d32; }

        /* Footer */
        .footer {
            padding: 2rem 0;
            border-top: 1px solid var(--ph-border);
            text-align: center;
            color: var(--ph-text-muted);
            font-size: 0.813rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .container { padding: 0 1rem; }
            .header h1 { font-size: 1.5rem; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
            .strategy-grid { grid-template-columns: 1fr; }
            .voc-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header" id="header"></header>

        <section class="kpi-grid" id="kpi-grid"></section>

        <section class="section">
            <div class="section-header">
                <div class="section-icon" style="background:rgba(245,78,0,0.1);color:var(--ph-orange);">&#x1F4CA;</div>
                <h2 class="section-title">Analytics Charts</h2>
            </div>
            <div class="charts-grid" id="charts-grid"></div>
        </section>

        <section class="section">
            <div class="section-header">
                <div class="section-icon" style="background:rgba(77,79,70,0.1);color:var(--ph-sage);">&#x1F3AF;</div>
                <h2 class="section-title">Strategy & Execution</h2>
            </div>
            <div class="strategy-grid" id="strategy-grid"></div>
        </section>

        <section class="section" id="matrix-section" style="display:none;">
            <div class="section-header">
                <div class="section-icon" style="background:rgba(245,78,0,0.1);color:var(--ph-orange);">&#x1F4CB;</div>
                <h2 class="section-title">Execution Matrix</h2>
            </div>
            <div class="chart-panel">
                <table class="matrix-table" id="matrix-table">
                    <thead>
                        <tr>
                            <th>Urgency</th>
                            <th>Directive</th>
                            <th>Details</th>
                            <th>ROI</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-tbody"></tbody>
                </table>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <div class="section-icon" style="background:rgba(76,175,80,0.1);color:#4CAF50;">&#x1F4AC;</div>
                <h2 class="section-title">Voice of Customer</h2>
            </div>
            <div class="voc-list" id="voc-list"></div>
        </section>

        <section class="section" id="chapters-section" style="display:none;">
            <div class="section-header">
                <div class="section-icon" style="background:rgba(91,141,239,0.1);color:#5B8DEF;">&#x1F4D6;</div>
                <h2 class="section-title">Deep Insights</h2>
            </div>
            <div id="chapters-list"></div>
        </section>

        <footer class="footer">
            <p>Generated by Review Analyzer &middot; Powered by AI</p>
            <p style="margin-top:0.25rem;">PostHog-inspired analytics dashboard</p>
        </footer>
    </div>

    <script>
    // Analysis data is injected here by the template engine
    if (!window.__ANALYSIS_DATA__) {
        window.__ANALYSIS_DATA__ = {
            "title": "Review Analysis",
            "asin": "",
            "total_reviews": 0,
            "avg_rating": 0,
            "meta": {},
            "kpis": [],
            "charts_data": {},
            "strategy": {},
            "execution_matrix": [],
            "voc_quotes": [],
            "market_insights": [],
            "chapters": []
        };
    }

    (function() {
        const D = window.__ANALYSIS_DATA__;
        const meta = D.meta || {};
        const kpis = D.kpis || [];
        const chartsData = D.charts_data || {};
        const strategy = D.strategy || {};
        const executionMatrix = D.execution_matrix || [];
        const vocQuotes = D.voc_quotes || [];
        const marketInsights = D.market_insights || [];
        const chapters = D.chapters || [];

        const COLORS = {
            orange: '#F54E00',
            sage: '#4d4f46',
            green: '#4CAF50',
            blue: '#5B8DEF',
            red: '#e53935',
            warm: ['#F54E00', '#ff7a33', '#4d4f46', '#6B8E23', '#8D6E63'],
            sentiment: {
                positive: '#4CAF50',
                negative: '#e53935',
                neutral: '#9E9E9E',
                highlight: '#F54E00'
            }
        };

        // ---- Header ----
        document.getElementById('header').innerHTML = `
            <div class="header-badge">Live Analytics</div>
            <h1>${meta.product_name || meta.report_title || D.title || 'Review Analysis'}</h1>
            <div class="header-meta">
                <span>&#x1F3F7; ASIN: ${D.asin || 'N/A'}</span>
                <span>&#x1F4C5; ${new Date().toISOString().split('T')[0]}</span>
                <span>&#x1F4CA; ${D.total_reviews || 0} Reviews Analyzed</span>
                <span>&#x2B50; ${D.avg_rating || 'N/A'} Avg Rating</span>
            </div>
        `;

        // ---- KPI Cards ----
        const accentClasses = ['accent-orange', 'accent-sage', 'accent-green', 'accent-blue'];
        document.getElementById('kpi-grid').innerHTML = kpis.map((kpi, i) => `
            <div class="kpi-card ${accentClasses[i % accentClasses.length]}">
                <div class="kpi-label">${kpi.label || kpi.title}</div>
                <div class="kpi-value" style="${kpi.is_danger ? 'color:var(--ph-orange)' : ''}">${kpi.value}</div>
                <div class="kpi-desc">${kpi.desc || ''}</div>
            </div>
        `).join('');

        // ---- Charts ----
        function renderChart(canvasId, type, data, options) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            new Chart(canvas.getContext('2d'), { type, data, options });
        }

        const chartsGrid = document.getElementById('charts-grid');
        const chartConfigs = [
            {
                key: 'sentiment',
                title: 'Sentiment Distribution',
                type: 'doughnut',
                colorSet: COLORS.warm
            },
            {
                key: 'features',
                title: 'Feature Satisfaction',
                type: 'bar',
                colorSet: COLORS.orange,
                horizontal: true
            },
            {
                key: 'scenarios',
                title: 'Usage Scenarios',
                type: 'pie',
                colorSet: COLORS.warm
            },
            {
                key: 'price_perception',
                title: 'Price Perception',
                type: 'bar',
                colorSet: COLORS.sage
            }
        ];

        let chartIndex = 0;
        chartConfigs.forEach(cfg => {
            const cd = chartsData[cfg.key];
            if (!cd || !cd.labels || cd.labels.length === 0) return;

            const canvasId = 'chart-' + cfg.key;
            chartsGrid.innerHTML += `
                <div class="chart-panel">
                    <div class="chart-panel-title">${cfg.title}</div>
                    <div class="chart-container">
                        <canvas id="${canvasId}"></canvas>
                    </div>
                </div>
            `;

            const isHorizontal = cfg.horizontal || cfg.type === 'bar';
            const bgColors = Array.isArray(cfg.colorSet)
                ? cd.labels.map((_, i) => cfg.colorSet[i % cfg.colorSet.length])
                : cd.labels.map(() => cfg.colorSet);

            setTimeout(() => {
                renderChart(canvasId, cfg.type, {
                    labels: cd.labels,
                    datasets: [{
                        label: cfg.title,
                        data: cd.data,
                        backgroundColor: bgColors,
                        borderColor: cfg.type === 'doughnut' || cfg.type === 'pie' ? '#fff' : bgColors,
                        borderWidth: cfg.type === 'doughnut' || cfg.type === 'pie' ? 2 : 0,
                        borderRadius: cfg.type === 'bar' ? 6 : 0
                    }]
                }, {
                    responsive: true,
                    maintainAspectRatio: true,
                    indexAxis: isHorizontal && cfg.horizontal ? 'y' : 'x',
                    plugins: {
                        legend: {
                            display: cfg.type !== 'bar',
                            position: 'bottom',
                            labels: { font: { family: 'Inter', size: 12 }, color: '#6B6D64', padding: 16 }
                        }
                    },
                    scales: cfg.type === 'bar' ? {
                        x: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { family: 'Inter' }, color: '#9A9C94' } },
                        y: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { family: 'Inter' }, color: '#9A9C94' }, beginAtZero: true }
                    } : undefined
                });
            }, 100);

            chartIndex++;
        });

        // ---- Strategy ----
        const stratHtml = [];
        const moatPros = strategy.moat_pros || [];
        const vulnCons = strategy.vulnerability_cons || [];

        if (moatPros.length > 0) {
            stratHtml.push(`
                <div class="strategy-card">
                    <div class="strategy-card-title" style="color:#4CAF50;">
                        <span>&#x1F6E1;</span> Moat / Strengths
                    </div>
                    ${moatPros.map(item => `
                        <div class="strategy-item">
                            <div class="strategy-item-title">${item.title}</div>
                            <div class="strategy-item-desc">${item.desc || ''}</div>
                        </div>
                    `).join('')}
                </div>
            `);
        }

        if (vulnCons.length > 0) {
            stratHtml.push(`
                <div class="strategy-card">
                    <div class="strategy-card-title" style="color:#e53935;">
                        <span>&#x26A0;</span> Vulnerability / Risks
                    </div>
                    ${vulnCons.map(item => `
                        <div class="strategy-item">
                            <div class="strategy-item-title">${item.title}</div>
                            <div class="strategy-item-desc">${item.desc || ''}</div>
                        </div>
                    `).join('')}
                </div>
            `);
        }

        document.getElementById('strategy-grid').innerHTML = stratHtml.join('');

        // ---- Execution Matrix ----
        if (executionMatrix.length > 0) {
            document.getElementById('matrix-section').style.display = '';
            document.getElementById('matrix-tbody').innerHTML = executionMatrix.map(row => {
                const urgencyClass = (row.urgency || '').toLowerCase().includes('immediate') ? 'immediate'
                    : (row.urgency || '').toLowerCase().includes('short') ? 'short-term' : 'long-term';
                return `
                    <tr>
                        <td><span class="urgency-badge ${urgencyClass}">${row.urgency || 'N/A'}</span></td>
                        <td style="font-weight:500;color:var(--ph-text);">${row.directive || ''}</td>
                        <td>${row.details || ''}</td>
                        <td>${row.roi || ''}</td>
                    </tr>
                `;
            }).join('');
        }

        // ---- VOC ----
        document.getElementById('voc-list').innerHTML = vocQuotes.map(voc => {
            const isDanger = voc.is_danger || false;
            const statusClass = isDanger ? 'negative' : 'positive';
            return `
                <div class="voc-card ${isDanger ? 'danger' : ''}">
                    <div class="voc-profile">${voc.profile || 'Anonymous User'}</div>
                    <span class="voc-status ${statusClass}">${voc.status || 'Neutral'}</span>
                    <div class="voc-quote">${voc.quote || ''}</div>
                    ${voc.analysis ? `<p style="font-size:0.813rem;color:var(--ph-text-muted);margin-top:0.5rem;">${voc.analysis}</p>` : ''}
                </div>
            `;
        }).join('');

        // ---- Chapters ----
        if (chapters.length > 0) {
            document.getElementById('chapters-section').style.display = '';
            document.getElementById('chapters-list').innerHTML = chapters.map(ch => `
                <div class="chapter-card">
                    <div class="chapter-title">${ch.title || ''}</div>
                    <div class="chapter-content">${ch.content || ''}</div>
                </div>
            `).join('');
        }

        // ---- Market Insights (fallback if no chapters) ----
        if (chapters.length === 0 && marketInsights.length > 0) {
            document.getElementById('chapters-section').style.display = '';
            document.getElementById('chapters-section').querySelector('.section-title').textContent = 'Market Insights';
            document.getElementById('chapters-list').innerHTML = `
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;">
                    ${marketInsights.map(mi => `
                        <div class="chart-panel">
                            <div class="strategy-item-title" style="margin-bottom:0.5rem;">${mi.title || ''}</div>
                            <div class="strategy-item-desc">${mi.desc || ''}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
    })();
    </script>
</body>
</html>
