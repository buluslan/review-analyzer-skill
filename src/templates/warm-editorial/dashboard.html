<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Analysis — Editorial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap');

        :root {
            --we-parchment: #f5f4ed;
            --we-parchment-light: #faf9f4;
            --we-card: #fffef9;
            --we-border: #e2dfd6;
            --we-ink: #1B365D;
            --we-ink-light: #2d4a72;
            --we-copper: #B5652A;
            --we-copper-light: #d4894a;
            --we-copper-bg: rgba(181, 101, 42, 0.06);
            --we-text: #2c2c2c;
            --we-text-secondary: #5a5a5a;
            --we-text-muted: #8a8a8a;
            --we-serif: 'Source Serif 4', 'Charter', 'Georgia', 'Times New Roman', serif;
            --we-sans: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; scroll-behavior: smooth; }

        body {
            font-family: var(--we-sans);
            background: var(--we-parchment);
            color: var(--we-text);
            line-height: 1.7;
            min-height: 100vh;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Editorial Masthead */
        .masthead {
            padding: 4rem 0 3rem;
            border-bottom: 2px solid var(--we-ink);
            margin-bottom: 3rem;
            position: relative;
        }

        .masthead-rule {
            width: 60px;
            height: 3px;
            background: var(--we-copper);
            margin-bottom: 1.5rem;
        }

        .masthead-eyebrow {
            font-family: var(--we-sans);
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--we-copper);
            margin-bottom: 1rem;
        }

        .masthead h1 {
            font-family: var(--we-serif);
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            color: var(--we-ink);
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
        }

        .masthead-subtitle {
            font-family: var(--we-serif);
            font-size: 1.125rem;
            font-style: italic;
            color: var(--we-text-secondary);
            max-width: 600px;
            line-height: 1.6;
        }

        .masthead-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 1.5rem;
            font-size: 0.813rem;
            color: var(--we-text-muted);
        }

        .masthead-meta span { display: flex; align-items: center; gap: 0.375rem; }
        .masthead-meta .ink { color: var(--we-ink); font-weight: 500; }

        /* Stat Cards */
        .stat-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--we-card);
            border: 1px solid var(--we-border);
            border-radius: 4px;
            padding: 1.75rem;
            text-align: center;
            position: relative;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 2px;
            background: var(--we-copper);
        }

        .stat-label {
            font-family: var(--we-sans);
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--we-text-muted);
            margin-bottom: 0.75rem;
        }

        .stat-value {
            font-family: var(--we-serif);
            font-size: 2.75rem;
            font-weight: 700;
            color: var(--we-ink);
            line-height: 1;
        }

        .stat-value.copper { color: var(--we-copper); }
        .stat-value.danger { color: #b91c1c; }

        .stat-desc {
            font-size: 0.813rem;
            color: var(--we-text-secondary);
            margin-top: 0.5rem;
            font-style: italic;
        }

        /* Section */
        .section {
            margin-bottom: 3rem;
        }

        .section-heading {
            font-family: var(--we-serif);
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--we-ink);
            margin-bottom: 0.375rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--we-border);
        }

        .section-heading::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--we-copper);
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        /* Chart Panel */
        .chart-panel {
            background: var(--we-card);
            border: 1px solid var(--we-border);
            border-radius: 4px;
            padding: 1.75rem;
            margin-bottom: 1.5rem;
        }

        .chart-panel-title {
            font-family: var(--we-serif);
            font-size: 1rem;
            font-weight: 600;
            color: var(--we-ink);
            margin-bottom: 1.25rem;
            font-style: italic;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 1.5rem;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-height: 300px;
        }

        /* Strategy */
        .strategy-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .strategy-column {
            background: var(--we-card);
            border: 1px solid var(--we-border);
            border-radius: 4px;
            padding: 1.75rem;
        }

        .strategy-column-title {
            font-family: var(--we-serif);
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--we-border);
        }

        .strategy-entry {
            padding: 1rem 0;
            border-bottom: 1px dotted var(--we-border);
        }

        .strategy-entry:last-child { border-bottom: none; }

        .strategy-entry-title {
            font-family: var(--we-serif);
            font-size: 1rem;
            font-weight: 600;
            color: var(--we-ink);
        }

        .strategy-entry-desc {
            font-size: 0.875rem;
            color: var(--we-text-secondary);
            margin-top: 0.25rem;
            line-height: 1.6;
        }

        /* Execution Matrix */
        .matrix-wrapper {
            background: var(--we-card);
            border: 1px solid var(--we-border);
            border-radius: 4px;
            overflow: hidden;
        }

        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .matrix-table th {
            font-family: var(--we-sans);
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--we-text-muted);
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid var(--we-border);
            text-align: left;
            background: var(--we-parchment-light);
        }

        .matrix-table td {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--we-border);
            color: var(--we-text-secondary);
        }

        .urgency-pill {
            font-family: var(--we-sans);
            font-size: 0.625rem;
            font-weight: 700;
            padding: 0.25rem 0.625rem;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .urgency-pill.immediate { background: rgba(185, 28, 28, 0.06); color: #b91c1c; }
        .urgency-pill.short-term { background: var(--we-copper-bg); color: var(--we-copper); }
        .urgency-pill.long-term { background: rgba(27, 54, 93, 0.06); color: var(--we-ink); }

        /* Pull Quote (VOC) */
        .pull-quotes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .pull-quote {
            background: var(--we-card);
            border: 1px solid var(--we-border);
            border-radius: 4px;
            padding: 2rem;
            position: relative;
        }

        .pull-quote::before {
            content: '\201C';
            font-family: var(--we-serif);
            font-size: 4rem;
            line-height: 1;
            color: var(--we-copper);
            opacity: 0.3;
            position: absolute;
            top: 0.25rem;
            left: 1rem;
        }

        .pull-quote.danger { border-left: 3px solid #b91c1c; }
        .pull-quote.safe { border-left: 3px solid var(--we-ink); }

        .pull-quote-attribution {
            font-family: var(--we-sans);
            font-size: 0.813rem;
            font-weight: 600;
            color: var(--we-ink);
            margin-bottom: 0.25rem;
        }

        .pull-quote-status {
            font-size: 0.688rem;
            font-weight: 500;
            color: var(--we-copper);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .pull-quote-text {
            font-family: var(--we-serif);
            font-size: 1rem;
            font-style: italic;
            color: var(--we-text-secondary);
            line-height: 1.8;
        }

        /* Chapter / Article */
        .article-block {
            background: var(--we-card);
            border: 1px solid var(--we-border);
            border-radius: 4px;
            padding: 2.5rem;
            margin-bottom: 1.5rem;
        }

        .article-block-title {
            font-family: var(--we-serif);
            font-size: 1.375rem;
            font-weight: 700;
            color: var(--we-ink);
            margin-bottom: 1.25rem;
            line-height: 1.3;
        }

        .article-block-body {
            font-family: var(--we-serif);
            font-size: 1rem;
            color: var(--we-text-secondary);
            line-height: 1.9;
        }

        .article-block-body h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--we-ink);
            margin: 1.5rem 0 0.75rem;
        }

        .article-block-body h3 {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--we-ink);
            margin: 1.25rem 0 0.5rem;
        }

        .article-block-body p { margin-bottom: 1rem; }
        .article-block-body ul, .article-block-body ol { margin-left: 1.5rem; margin-bottom: 1rem; }
        .article-block-body li { margin-bottom: 0.375rem; }
        .article-block-body blockquote {
            border-left: 3px solid var(--we-copper);
            padding-left: 1.25rem;
            margin: 1.25rem 0;
            font-style: italic;
            color: var(--we-ink);
        }

        .article-block-body strong { color: var(--we-ink); font-weight: 600; }

        /* Footer - Editorial colophon */
        .colophon {
            margin-top: 3rem;
            padding: 2rem 0;
            border-top: 2px solid var(--we-ink);
            text-align: center;
        }

        .colophon-rule {
            width: 40px;
            height: 2px;
            background: var(--we-copper);
            margin: 0 auto 1rem;
        }

        .colophon-text {
            font-family: var(--we-sans);
            font-size: 0.75rem;
            color: var(--we-text-muted);
            letter-spacing: 0.05em;
        }

        @media (max-width: 768px) {
            .container { padding: 0 1rem; }
            .masthead { padding: 2.5rem 0 2rem; }
            .masthead h1 { font-size: 1.75rem; }
            .stat-row { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
            .strategy-grid { grid-template-columns: 1fr; }
            .pull-quotes { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="masthead" id="masthead"></header>
        <section class="stat-row" id="stat-row"></section>

        <section class="section">
            <h2 class="section-heading">Data Visualizations</h2>
            <div class="charts-grid" id="charts-grid"></div>
        </section>

        <section class="section">
            <h2 class="section-heading">Strategic Outlook</h2>
            <div class="strategy-grid" id="strategy-grid"></div>
        </section>

        <section class="section" id="matrix-section" style="display:none;">
            <h2 class="section-heading">Action Plan</h2>
            <div class="matrix-wrapper">
                <table class="matrix-table">
                    <thead><tr><th>Priority</th><th>Directive</th><th>Details</th><th>Expected Return</th></tr></thead>
                    <tbody id="matrix-tbody"></tbody>
                </table>
            </div>
        </section>

        <section class="section">
            <h2 class="section-heading">Customer Voices</h2>
            <div class="pull-quotes" id="pull-quotes"></div>
        </section>

        <section class="section" id="chapters-section" style="display:none;">
            <h2 class="section-heading">In-Depth Reporting</h2>
            <div id="chapters-list"></div>
        </section>

        <footer class="colophon">
            <div class="colophon-rule"></div>
            <p class="colophon-text">Review Analyzer &middot; Warm Editorial Template &middot; Generated by AI</p>
        </footer>
    </div>

    <script>
    // Analysis data is injected here by the template engine
    if (!window.__ANALYSIS_DATA__) {
        window.__ANALYSIS_DATA__ = {
            "title": "Review Analysis",
            "asin": "",
            "total_reviews": 0,
            "avg_rating": 0,
            "meta": {},
            "kpis": [],
            "charts_data": {},
            "strategy": {},
            "execution_matrix": [],
            "voc_quotes": [],
            "market_insights": [],
            "chapters": []
        };
    }

    (function() {
        const D = window.__ANALYSIS_DATA__;
        const meta = D.meta || {};
        const kpis = D.kpis || [];
        const chartsData = D.charts_data || {};
        const strategy = D.strategy || {};
        const executionMatrix = D.execution_matrix || [];
        const vocQuotes = D.voc_quotes || [];
        const marketInsights = D.market_insights || [];
        const chapters = D.chapters || [];

        const INK = '#1B365D';
        const COPPER = '#B5652A';
        const PALETTE = ['#1B365D', '#B5652A', '#d4894a', '#5a5a5a', '#8a8a8a', '#2d4a72'];

        // ---- Masthead ----
        document.getElementById('masthead').innerHTML = `
            <div class="masthead-rule"></div>
            <div class="masthead-eyebrow">Review Intelligence Report</div>
            <h1>${meta.product_name || meta.report_title || D.title || 'Review Analysis'}</h1>
            <p class="masthead-subtitle">A comprehensive analysis of ${D.total_reviews || 0} customer reviews, revealing patterns in sentiment, satisfaction, and market positioning.</p>
            <div class="masthead-meta">
                <span>ASIN <span class="ink">${D.asin || 'N/A'}</span></span>
                <span>${new Date().toISOString().split('T')[0]}</span>
                <span>${D.total_reviews || 0} reviews analyzed</span>
                <span>Average rating <span class="ink">${D.avg_rating || 'N/A'}</span></span>
            </div>
        `;

        // ---- Stat Cards ----
        document.getElementById('stat-row').innerHTML = kpis.map((kpi, i) => {
            const cls = kpi.is_danger ? 'danger' : (i === 0 ? 'copper' : '');
            return `
                <div class="stat-card">
                    <div class="stat-label">${kpi.label || kpi.title}</div>
                    <div class="stat-value ${cls}">${kpi.value}</div>
                    <div class="stat-desc">${kpi.desc || ''}</div>
                </div>
            `;
        }).join('');

        // ---- Charts ----
        const chartsGrid = document.getElementById('charts-grid');
        const defs = [
            { key: 'sentiment', title: 'Sentiment Distribution', type: 'doughnut' },
            { key: 'features', title: 'Feature Satisfaction', type: 'bar', horizontal: true },
            { key: 'scenarios', title: 'Usage Scenarios', type: 'pie' },
            { key: 'price_perception', title: 'Price Perception', type: 'bar' }
        ];

        defs.forEach(def => {
            const cd = chartsData[def.key];
            if (!cd || !cd.labels || cd.labels.length === 0) return;

            const cId = 'ed-' + def.key;
            chartsGrid.innerHTML += `
                <div class="chart-panel">
                    <div class="chart-panel-title">${def.title}</div>
                    <div class="chart-container"><canvas id="${cId}"></canvas></div>
                </div>
            `;

            const isPie = def.type === 'doughnut' || def.type === 'pie';
            const bg = isPie
                ? cd.labels.map((_, i) => PALETTE[i % PALETTE.length])
                : cd.labels.map(() => INK);

            setTimeout(() => {
                const canvas = document.getElementById(cId);
                if (!canvas) return;
                new Chart(canvas.getContext('2d'), {
                    type: def.type,
                    data: {
                        labels: cd.labels,
                        datasets: [{
                            data: cd.data,
                            backgroundColor: bg,
                            borderColor: isPie ? '#fffef9' : bg,
                            borderWidth: isPie ? 2 : 0,
                            borderRadius: def.type === 'bar' ? 4 : 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        indexAxis: def.horizontal ? 'y' : 'x',
                        plugins: {
                            legend: {
                                display: isPie,
                                position: 'bottom',
                                labels: {
                                    font: { family: 'Source Serif 4', size: 12 },
                                    color: '#5a5a5a',
                                    padding: 20,
                                    usePointStyle: true
                                }
                            }
                        },
                        scales: def.type === 'bar' ? {
                            x: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { family: 'Inter', size: 11 }, color: '#8a8a8a' } },
                            y: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { family: 'Inter', size: 11 }, color: '#8a8a8a' }, beginAtZero: true }
                        } : undefined
                    }
                });
            }, 100);
        });

        // ---- Strategy ----
        const moatPros = strategy.moat_pros || [];
        const vulnCons = strategy.vulnerability_cons || [];
        let stratHtml = '';

        if (moatPros.length > 0) {
            stratHtml += `<div class="strategy-column">
                <div class="strategy-column-title" style="color:var(--we-ink);">Competitive Advantages</div>
                ${moatPros.map(item => `
                    <div class="strategy-entry">
                        <div class="strategy-entry-title">${item.title}</div>
                        <div class="strategy-entry-desc">${item.desc || ''}</div>
                    </div>
                `).join('')}
            </div>`;
        }

        if (vulnCons.length > 0) {
            stratHtml += `<div class="strategy-column">
                <div class="strategy-column-title" style="color:#b91c1c;">Areas of Concern</div>
                ${vulnCons.map(item => `
                    <div class="strategy-entry">
                        <div class="strategy-entry-title">${item.title}</div>
                        <div class="strategy-entry-desc">${item.desc || ''}</div>
                    </div>
                `).join('')}
            </div>`;
        }

        document.getElementById('strategy-grid').innerHTML = stratHtml || '<div></div><div></div>';

        // ---- Matrix ----
        if (executionMatrix.length > 0) {
            document.getElementById('matrix-section').style.display = '';
            document.getElementById('matrix-tbody').innerHTML = executionMatrix.map(row => {
                const uc = (row.urgency || '').toLowerCase().includes('immediate') ? 'immediate'
                    : (row.urgency || '').toLowerCase().includes('short') ? 'short-term' : 'long-term';
                return `<tr>
                    <td><span class="urgency-pill ${uc}">${row.urgency || '—'}</span></td>
                    <td style="font-weight:600;color:var(--we-ink);">${row.directive || ''}</td>
                    <td>${row.details || ''}</td>
                    <td style="color:var(--we-copper);font-style:italic;">${row.roi || ''}</td>
                </tr>`;
            }).join('');
        }

        // ---- VOC as Pull Quotes ----
        document.getElementById('pull-quotes').innerHTML = vocQuotes.map(voc => {
            const isDanger = voc.is_danger || false;
            const cls = isDanger ? 'danger' : 'safe';
            return `
                <div class="pull-quote ${cls}">
                    <div class="pull-quote-attribution">${voc.profile || 'A Customer'}</div>
                    <div class="pull-quote-status">${voc.status || 'Neutral'}</div>
                    <div class="pull-quote-text">${voc.quote || ''}</div>
                </div>
            `;
        }).join('');

        // ---- Chapters ----
        if (chapters.length > 0) {
            document.getElementById('chapters-section').style.display = '';
            document.getElementById('chapters-list').innerHTML = chapters.map(ch => `
                <div class="article-block">
                    <div class="article-block-title">${ch.title || ''}</div>
                    <div class="article-block-body">${ch.content || ''}</div>
                </div>
            `).join('');
        } else if (marketInsights.length > 0) {
            document.getElementById('chapters-section').style.display = '';
            document.getElementById('chapters-list').innerHTML = `
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem;">
                    ${marketInsights.map(mi => `
                        <div class="chart-panel">
                            <div class="strategy-entry-title">${mi.title || ''}</div>
                            <div class="strategy-entry-desc">${mi.desc || ''}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
    })();
    </script>
</body>
</html>
