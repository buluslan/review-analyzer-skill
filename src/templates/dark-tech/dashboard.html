<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Intel Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

        :root {
            --dt-bg: #0a0e17;
            --dt-card: #111827;
            --dt-card-hover: #1a2332;
            --dt-border-solid: #1e293b;
            --dt-cyan: #00e5c8;
            --dt-cyan-dim: rgba(0, 229, 200, 0.15);
            --dt-cyan-glow: rgba(0, 229, 200, 0.3);
            --dt-blue: #3b82f6;
            --dt-red: #ef4444;
            --dt-green: #22c55e;
            --dt-yellow: #f59e0b;
            --dt-text: #e2e8f0;
            --dt-text-secondary: #94a3b8;
            --dt-text-muted: #64748b;
            --dt-mono: 'JetBrains Mono', 'SF Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; scroll-behavior: smooth; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--dt-bg);
            color: var(--dt-text);
            line-height: 1.6;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 15% 10%, rgba(0, 229, 200, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 90%, rgba(59, 130, 246, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            padding: 2.5rem 0;
            border-bottom: 1px solid var(--dt-border-solid);
            margin-bottom: 2rem;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, var(--dt-cyan), transparent);
        }

        .header-eyebrow {
            font-family: var(--dt-mono);
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--dt-cyan);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-eyebrow::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--dt-cyan);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--dt-cyan-glow);
            animation: glow-pulse 2s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 8px var(--dt-cyan-glow); }
            50% { box-shadow: 0 0 20px var(--dt-cyan-glow), 0 0 40px rgba(0, 229, 200, 0.1); }
        }

        .header h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 60%, var(--dt-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            font-family: var(--dt-mono);
            font-size: 0.75rem;
            color: var(--dt-text-muted);
        }

        .header-meta span { display: flex; align-items: center; gap: 0.375rem; }
        .header-meta .highlight { color: var(--dt-cyan); }

        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            background: var(--dt-card);
            border: 1px solid var(--dt-border-solid);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .kpi-card:hover {
            border-color: var(--dt-cyan-dim);
            box-shadow: 0 0 24px rgba(0, 229, 200, 0.06);
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--dt-cyan), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .kpi-card:hover::before { opacity: 1; }

        .kpi-label {
            font-family: var(--dt-mono);
            font-size: 0.5625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--dt-text-muted);
            margin-bottom: 0.5rem;
        }

        .kpi-value {
            font-family: var(--dt-mono);
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }

        .kpi-value.cyan { color: var(--dt-cyan); text-shadow: 0 0 20px var(--dt-cyan-glow); }
        .kpi-value.danger { color: var(--dt-red); }

        .kpi-desc {
            font-size: 0.75rem;
            color: var(--dt-text-muted);
            margin-top: 0.375rem;
        }

        /* Section */
        .section {
            margin-bottom: 2.5rem;
        }

        .section-title {
            font-family: var(--dt-mono);
            font-size: 0.6875rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--dt-cyan);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--dt-border-solid), transparent);
        }

        /* Panel */
        .panel {
            background: var(--dt-card);
            border: 1px solid var(--dt-border-solid);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
        }

        .panel-title {
            font-family: var(--dt-mono);
            font-size: 0.5625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--dt-text-muted);
            margin-bottom: 1rem;
        }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 1rem;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-height: 300px;
        }

        /* Strategy */
        .strategy-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .strategy-item {
            padding: 0.875rem 0;
            border-bottom: 1px solid var(--dt-border-solid);
        }

        .strategy-item:last-child { border-bottom: none; }

        .strategy-item-title {
            font-size: 0.938rem;
            font-weight: 600;
            color: var(--dt-text);
        }

        .strategy-item-desc {
            font-size: 0.813rem;
            color: var(--dt-text-muted);
            margin-top: 0.25rem;
        }

        /* Matrix */
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.813rem;
        }

        .matrix-table th {
            font-family: var(--dt-mono);
            font-size: 0.5625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--dt-text-muted);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--dt-border-solid);
            text-align: left;
        }

        .matrix-table td {
            padding: 0.875rem 1rem;
            border-bottom: 1px solid var(--dt-border-solid);
            color: var(--dt-text-secondary);
        }

        .urgency-tag {
            font-family: var(--dt-mono);
            font-size: 0.5625rem;
            font-weight: 700;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .urgency-tag.immediate { background: rgba(239, 68, 68, 0.15); color: var(--dt-red); border: 1px solid rgba(239, 68, 68, 0.2); }
        .urgency-tag.short-term { background: var(--dt-cyan-dim); color: var(--dt-cyan); border: 1px solid rgba(0, 229, 200, 0.2); }
        .urgency-tag.long-term { background: rgba(34, 197, 94, 0.1); color: var(--dt-green); border: 1px solid rgba(34, 197, 94, 0.15); }

        /* VOC */
        .voc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
        }

        .voc-card {
            background: var(--dt-card);
            border: 1px solid var(--dt-border-solid);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
        }

        .voc-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 3px;
            border-radius: 12px 0 0 12px;
        }

        .voc-card.positive::before { background: var(--dt-green); box-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
        .voc-card.negative::before { background: var(--dt-red); box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }

        .voc-profile {
            font-family: var(--dt-mono);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--dt-text);
        }

        .voc-status {
            font-family: var(--dt-mono);
            font-size: 0.5625rem;
            font-weight: 700;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            display: inline-block;
            margin: 0.5rem 0;
        }

        .voc-card.positive .voc-status { background: rgba(34, 197, 94, 0.1); color: var(--dt-green); }
        .voc-card.negative .voc-status { background: rgba(239, 68, 68, 0.1); color: var(--dt-red); }

        .voc-quote {
            font-size: 0.875rem;
            color: var(--dt-text-secondary);
            line-height: 1.7;
            font-style: italic;
        }

        /* Chapter */
        .chapter-panel {
            background: var(--dt-card);
            border: 1px solid var(--dt-border-solid);
            border-radius: 12px;
            padding: 1.75rem;
            margin-bottom: 1rem;
        }

        .chapter-panel-title {
            font-family: var(--dt-mono);
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--dt-cyan);
            margin-bottom: 1rem;
        }

        .chapter-panel-body {
            font-size: 0.938rem;
            color: var(--dt-text-secondary);
            line-height: 1.8;
        }

        .chapter-panel-body h2 { font-size: 1.063rem; font-weight: 600; color: var(--dt-text); margin: 1rem 0 0.5rem; }
        .chapter-panel-body h3 { font-size: 0.938rem; font-weight: 600; color: var(--dt-text); margin: 0.75rem 0 0.375rem; }
        .chapter-panel-body p { margin-bottom: 0.625rem; }
        .chapter-panel-body ul, .chapter-panel-body ol { margin-left: 1.25rem; margin-bottom: 0.625rem; }
        .chapter-panel-body li { margin-bottom: 0.25rem; }
        .chapter-panel-body blockquote { border-left: 2px solid var(--dt-cyan); padding-left: 1rem; margin: 0.75rem 0; font-style: italic; color: var(--dt-text); }
        .chapter-panel-body strong { color: var(--dt-text); font-weight: 600; }

        /* Footer */
        .footer {
            padding: 2rem 0;
            border-top: 1px solid var(--dt-border-solid);
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
        }

        .footer-text {
            font-family: var(--dt-mono);
            font-size: 0.6875rem;
            color: var(--dt-text-muted);
        }

        .footer-text .glow { color: var(--dt-cyan); }

        @media (max-width: 768px) {
            .container { padding: 0 1rem; }
            .header h1 { font-size: 1.5rem; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
            .strategy-grid { grid-template-columns: 1fr; }
            .voc-grid { grid-template-columns: 1fr; }
            .footer { flex-direction: column; gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header" id="header"></header>
        <section class="kpi-grid" id="kpi-grid"></section>

        <section class="section">
            <div class="section-title">Signal Analytics</div>
            <div class="charts-grid" id="charts-grid"></div>
        </section>

        <section class="section">
            <div class="section-title">Strategic Intel</div>
            <div class="strategy-grid" id="strategy-grid"></div>
        </section>

        <section class="section" id="matrix-section" style="display:none;">
            <div class="section-title">Execution Protocol</div>
            <div class="panel">
                <table class="matrix-table">
                    <thead><tr><th>Priority</th><th>Directive</th><th>Details</th><th>ROI</th></tr></thead>
                    <tbody id="matrix-tbody"></tbody>
                </table>
            </div>
        </section>

        <section class="section">
            <div class="section-title">Signal Intercept (VOC)</div>
            <div class="voc-grid" id="voc-grid"></div>
        </section>

        <section class="section" id="chapters-section" style="display:none;">
            <div class="section-title">Deep Analysis</div>
            <div id="chapters-list"></div>
        </section>

        <footer class="footer">
            <span class="footer-text"><span class="glow">&gt;_</span> review-intel v2.0</span>
            <span class="footer-text">dark-tech // dashboard</span>
        </footer>
    </div>

    <script>
    // Analysis data is injected here by the template engine
    window.__ANALYSIS_DATA__ = {
        "title": "Product ASIN Review Analysis",
        "asin": "B001OAXE0S",
        "total_reviews": 20,
        "avg_rating": 3.4,
        "statistics": {},
        "chapters": [],
        "charts": []
    };

    (function() {
        const D = window.__ANALYSIS_DATA__;
        const meta = D.meta || {};
        const kpis = D.kpis || [];
        const chartsData = D.charts_data || {};
        const strategy = D.strategy || {};
        const executionMatrix = D.execution_matrix || [];
        const vocQuotes = D.voc_quotes || [];
        const marketInsights = D.market_insights || [];
        const chapters = D.chapters || [];

        const CYAN = '#00e5c8';
        const PALETTE = ['#00e5c8', '#3b82f6', '#8b5cf6', '#f59e0b', '#22c55e', '#ef4444'];

        // ---- Header ----
        document.getElementById('header').innerHTML = `
            <div class="header-eyebrow">Review Intel Dashboard</div>
            <h1>${meta.product_name || meta.report_title || D.title || 'Review Analysis'}</h1>
            <div class="header-meta">
                <span>ASIN <span class="highlight">${D.asin || 'N/A'}</span></span>
                <span>${new Date().toISOString().split('T')[0]}</span>
                <span><span class="highlight">${D.total_reviews || 0}</span> signals captured</span>
                <span>avg_rating <span class="highlight">${D.avg_rating || 'N/A'}</span></span>
            </div>
        `;

        // ---- KPIs ----
        document.getElementById('kpi-grid').innerHTML = kpis.map((kpi, i) => {
            const cls = kpi.is_danger ? 'danger' : (i === 0 ? 'cyan' : '');
            return `
                <div class="kpi-card">
                    <div class="kpi-label">${kpi.label || kpi.title}</div>
                    <div class="kpi-value ${cls}">${kpi.value}</div>
                    <div class="kpi-desc">${kpi.desc || ''}</div>
                </div>
            `;
        }).join('');

        // ---- Charts ----
        const chartsGrid = document.getElementById('charts-grid');
        const defs = [
            { key: 'sentiment', title: 'SENTIMENT_DISTRIBUTION', type: 'doughnut' },
            { key: 'features', title: 'FEATURE_SATISFACTION', type: 'bar', horizontal: true },
            { key: 'scenarios', title: 'USAGE_SCENARIOS', type: 'pie' },
            { key: 'price_perception', title: 'PRICE_PERCEPTION', type: 'bar' },
            { key: 'design_usability', title: 'DESIGN_USABILITY', type: 'bar', horizontal: true },
            { key: 'durability', title: 'DURABILITY_METRICS', type: 'bar' }
        ];

        defs.forEach(def => {
            const cd = chartsData[def.key];
            if (!cd || !cd.labels || cd.labels.length === 0) return;

            const cId = 'ch-' + def.key;
            chartsGrid.innerHTML += `
                <div class="panel">
                    <div class="panel-title">${def.title}</div>
                    <div class="chart-container"><canvas id="${cId}"></canvas></div>
                </div>
            `;

            const isPie = def.type === 'doughnut' || def.type === 'pie';
            const bg = isPie
                ? cd.labels.map((_, i) => PALETTE[i % PALETTE.length])
                : cd.labels.map(() => CYAN);

            setTimeout(() => {
                const canvas = document.getElementById(cId);
                if (!canvas) return;
                new Chart(canvas.getContext('2d'), {
                    type: def.type,
                    data: {
                        labels: cd.labels,
                        datasets: [{
                            data: cd.data,
                            backgroundColor: bg,
                            borderColor: isPie ? '#111827' : bg,
                            borderWidth: isPie ? 2 : 0,
                            borderRadius: def.type === 'bar' ? 6 : 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        indexAxis: def.horizontal ? 'y' : 'x',
                        plugins: {
                            legend: {
                                display: isPie,
                                position: 'bottom',
                                labels: { font: { family: 'JetBrains Mono', size: 11 }, color: '#64748b', padding: 16, boxWidth: 8 }
                            }
                        },
                        scales: def.type === 'bar' ? {
                            x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { font: { family: 'JetBrains Mono', size: 10 }, color: '#64748b' } },
                            y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { font: { family: 'JetBrains Mono', size: 10 }, color: '#64748b' }, beginAtZero: true }
                        } : undefined
                    }
                });
            }, 100);
        });

        // ---- Strategy ----
        const moatPros = strategy.moat_pros || [];
        const vulnCons = strategy.vulnerability_cons || [];
        let stratHtml = '';

        if (moatPros.length > 0) {
            stratHtml += `<div class="panel">
                <div class="panel-title" style="color:var(--dt-green);">&#x25C6; MOAT_SIGNALS</div>
                ${moatPros.map(item => `
                    <div class="strategy-item">
                        <div class="strategy-item-title">${item.title}</div>
                        <div class="strategy-item-desc">${item.desc || ''}</div>
                    </div>
                `).join('')}
            </div>`;
        }

        if (vulnCons.length > 0) {
            stratHtml += `<div class="panel">
                <div class="panel-title" style="color:var(--dt-red);">&#x25B2; VULNERABILITY_ALERT</div>
                ${vulnCons.map(item => `
                    <div class="strategy-item">
                        <div class="strategy-item-title">${item.title}</div>
                        <div class="strategy-item-desc">${item.desc || ''}</div>
                    </div>
                `).join('')}
            </div>`;
        }

        document.getElementById('strategy-grid').innerHTML = stratHtml || '<div></div><div></div>';

        // ---- Matrix ----
        if (executionMatrix.length > 0) {
            document.getElementById('matrix-section').style.display = '';
            document.getElementById('matrix-tbody').innerHTML = executionMatrix.map(row => {
                const uc = (row.urgency || '').toLowerCase().includes('immediate') ? 'immediate'
                    : (row.urgency || '').toLowerCase().includes('short') ? 'short-term' : 'long-term';
                return `<tr>
                    <td><span class="urgency-tag ${uc}">${row.urgency || '—'}</span></td>
                    <td style="font-weight:600;color:var(--dt-text);">${row.directive || ''}</td>
                    <td>${row.details || ''}</td>
                    <td style="color:var(--dt-cyan);">${row.roi || ''}</td>
                </tr>`;
            }).join('');
        }

        // ---- VOC ----
        document.getElementById('voc-grid').innerHTML = vocQuotes.map(voc => {
            const isDanger = voc.is_danger || false;
            const cls = isDanger ? 'negative' : 'positive';
            return `
                <div class="voc-card ${cls}">
                    <div class="voc-profile">${voc.profile || 'Unknown Signal'}</div>
                    <div class="voc-status">${voc.status || 'NEUTRAL'}</div>
                    <div class="voc-quote">${voc.quote || ''}</div>
                </div>
            `;
        }).join('');

        // ---- Chapters ----
        if (chapters.length > 0) {
            document.getElementById('chapters-section').style.display = '';
            document.getElementById('chapters-list').innerHTML = chapters.map(ch => `
                <div class="chapter-panel">
                    <div class="chapter-panel-title">${ch.title || ''}</div>
                    <div class="chapter-panel-body">${ch.content || ''}</div>
                </div>
            `).join('');
        } else if (marketInsights.length > 0) {
            document.getElementById('chapters-section').style.display = '';
            document.getElementById('chapters-list').innerHTML = `
                <div class="panel">
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.25rem;">
                        ${marketInsights.map(mi => `
                            <div>
                                <div class="strategy-item-title">${mi.title || ''}</div>
                                <div class="strategy-item-desc">${mi.desc || ''}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
    })();
    </script>
</body>
</html>
